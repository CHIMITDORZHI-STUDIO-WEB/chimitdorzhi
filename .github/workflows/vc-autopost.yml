name: VC autopost (drafts)

on:
  schedule:
    - cron: '0 7 * * *'   # ежедневно 07:00 UTC
  workflow_dispatch:        # ручной запуск из вкладки Actions

permissions:
  contents: write

concurrency:
  group: vc-autopost
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Post draft to VC
        env:
          VC_JWT: ${{ secrets.VC_JWT }}
          VC_OSNOVA_REMEMBER: ${{ secrets.VC_OSNOVA_REMEMBER }}
          VC_AUTH_REFRESH: ${{ secrets.VC_AUTH_REFRESH }}
          VC_SUBSITE_ID: ${{ secrets.VC_SUBSITE_ID }}
        run: node tools/vc-poster.js
      - name: Commit state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/vc-posted.json
          if git diff --cached --quiet; then
            echo "Состояние не изменилось"
          else
            git commit -m "VC autopost: обновление состояния [skip ci]"
            git push
          fi
