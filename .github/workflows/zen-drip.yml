name: Zen drip feed

# Ежедневно «подаёт» в Дзен следующую порцию архивных статей через RSS:
# проставляет им свежую дату в feed.xml и коммитит. Дзен подхватывает их
# как новые. Когда архив закончится — скрипт ничего не делает.
on:
  schedule:
    - cron: '0 7 * * *'   # каждый день в 07:00 UTC (10:00 МСК)
  workflow_dispatch:
    inputs:
      batch:
        description: 'Сколько статей выпустить за раз'
        required: false
        default: '7'

jobs:
  drip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Release next batch to Zen
        # build-blog пропустит генерацию обложек без sharp (они уже в репо).
        run: |
          node tools/zen-drip.js ${{ github.event.inputs.batch || '7' }}
          node tools/build-offers.js
          node tools/build-blog.js
          node tools/build-search.js
      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore(zen): дозированная подача архива в RSS [skip ci]"
            git push
          else
            echo "Очередь пуста — изменений нет."
          fi
