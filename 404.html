<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена | Чимитдоржи Дарижапов</title>
    <meta name="description" content="Запрашиваемая страница не найдена на сайте chimitdorzhi.tech. Перейдите в каталог услуг или вернитесь на главную.">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#121218">

    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="120x120" href="/favicon-120.png">

    <link rel="preload" href="/assets/fonts/InterVariable.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/assets/phosphor/regular.css">
    <link rel="stylesheet" href="/style.css?v=21">
    <style>
        .err {
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 24px 60px;
            position: relative;
            z-index: 2;
        }
        .err-inner {
            max-width: 640px;
            text-align: center;
        }
        .err-code {
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -4px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--gradient-1), var(--gradient-2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .err h1 {
            font-size: clamp(1.4rem, 3vw, 2rem);
            margin-bottom: 14px;
        }
        .err p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .err-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 36px;
        }
        .err-suggest {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        .err-suggest a {
            padding: 14px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: border-color 0.2s, transform 0.2s;
        }
        .err-suggest a:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="noise-overlay"></div>
    <div class="gradient-blob blob-1"></div>
    <div class="gradient-blob blob-2"></div>

    <main class="err">
        <div class="err-inner">
            <div class="err-code">404</div>
            <h1>Страница не найдена</h1>
            <p>Возможно, страница переехала, или в адресе ошибка. Ниже популярные разделы — вернись на главную или зайди в каталог услуг.</p>
            <div class="err-actions">
                <a href="/" class="btn btn-accent"><i class="ph ph-house"></i> На главную</a>
                <a href="/services/" class="btn btn-ghost"><i class="ph ph-list-bullets"></i> Каталог услуг</a>
                <a href="https://t.me/chimitdorzhi" target="_blank" rel="noopener" class="btn btn-ghost"><i class="ph ph-telegram-logo"></i> Связаться</a>
            </div>
            <div class="err-suggest">
                <a href="/services/rkn-audit/">Аудит сайта по 152-ФЗ</a>
                <a href="/services/ai-agents/">AI-агенты и LLM</a>
                <a href="/services/cfa-issuance/">Выпуск ЦФА по 259-ФЗ</a>
                <a href="/services/web-development/">Разработка сайтов</a>
                <a href="/services/cybersecurity/">Кибербезопасность</a>
                <a href="/services/cto-as-a-service/">CTO-as-a-Service</a>
            </div>
        </div>
    </main>
</body>

</html>
